name: OpenRouter PR Judge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: openrouter-pr-judge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scope:
    name: PR Scope Guard
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted guard code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Check external PR file scope
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/pr_scope_guard.py

  judge:
    name: OpenRouter PR Judge
    needs: scope
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted judge code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Judge PR patch with OpenRouter
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: doppler run -- python3 .github/scripts/openrouter_pr_judge.py
